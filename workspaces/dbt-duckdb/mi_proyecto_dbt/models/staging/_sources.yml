version: 2

sources:
  - name: weather
    description: "Datos de pronóstico meteorológico sincronizados desde OpenWeather via Airbyte."
    database: "{{ target.database }}"
    schema: weather
    tables:
      - name: weather
        description: "Pronóstico de 5 días con intervalos de 3 horas para Ciudad del Este, PY."

  - name: github
    description: "Metadatos del repositorio SEMP/lib-utilidades sincronizados desde GitHub via Airbyte."
    database: "{{ target.database }}"
    schema: github
    tables:
      - name: branches
        description: "Ramas del repositorio SEMP/lib-utilidades."
      - name: stargazers
        description: "Usuarios que marcaron con estrella el repositorio SEMP/lib-utilidades."
