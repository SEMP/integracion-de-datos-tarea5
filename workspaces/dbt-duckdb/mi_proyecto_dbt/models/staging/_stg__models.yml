version: 2

models:
  - name: stg_pokemon
    description: "Datos de Pokemon limpiados desde la API"
    columns:
      - name: pokemon_id
        description: "ID único del Pokemon"
        tests:
          - unique
          - not_null
      - name: pokemon_name
        description: "Nombre del Pokemon"
        tests:
          - not_null
      - name: height
        tests:
          - not_null
      - name: weight
        tests:
          - not_null
